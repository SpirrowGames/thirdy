[project]
name = "llm-client"
version = "0.1.0"
description = "LLM proxy client for Lexora (OpenAI-compatible API)"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28",
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/llm_client"]
