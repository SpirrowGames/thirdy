[project]
name = "shared-schemas"
version = "0.1.0"
description = "Shared Pydantic schemas for Thirdy"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_schemas"]
