# Thirdy - nginx reverse proxy configuration
# Place in /etc/nginx/sites-available/thirdy and symlink to sites-enabled

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name thirdy.spirrowgames.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name thirdy.spirrowgames.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/thirdy.spirrowgames.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thirdy.spirrowgames.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API proxy
    location /auth/ {
        proxy_pass http://127.0.0.1:8720;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /conversations/ {
        proxy_pass http://127.0.0.1:8720;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;  # Long timeout for SSE streaming
    }

    location /chat {
        proxy_pass http://127.0.0.1:8720;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;  # Required for SSE
    }

    # Catch-all API endpoints
    location ~ ^/(specifications|decisions|designs|tasks|codes|pull-requests|votes|vote-sessions|voice|issues|audits|watches|jobs|costs|notifications|teams|activities|health)(/|$) {
        proxy_pass http://127.0.0.1:8720;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 50M;  # For voice file uploads
}
