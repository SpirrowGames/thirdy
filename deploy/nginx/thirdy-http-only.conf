# Thirdy - HTTP-only config (pre-certbot)
server {
    listen 80;
    listen [::]:80;
    server_name thirdy.spirrowgames.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy
    location ~ ^/(auth|conversations|chat|specifications|decisions|designs|tasks|codes|pull-requests|votes|vote-sessions|voice|issues|audits|watches|jobs|costs|notifications|teams|activities|health)(/|$) {
        proxy_pass http://127.0.0.1:8720;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 50M;
}
